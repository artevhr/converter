<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Конвертер единиц</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f13;
    color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 0.78rem;
    color: #6b7280;
    margin-bottom: 24px;
  }

  .card {
    background: #1a1a24;
    border: 1px solid #2a2a38;
    border-radius: 20px;
    padding: 20px;
    width: 100%;
    max-width: 480px;
  }

  /* Unit type selector */
  .unit-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .unit-tab {
    flex: 1;
    min-width: 60px;
    padding: 8px 4px;
    border-radius: 10px;
    border: 1px solid #2a2a38;
    background: #13131b;
    color: #9ca3af;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .unit-tab.active {
    background: #312e81;
    border-color: #6366f1;
    color: #a5b4fc;
  }

  .unit-tab:hover:not(.active) {
    border-color: #4b5563;
    color: #d1d5db;
  }

  /* Input row */
  .input-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
    margin-bottom: 16px;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  .num-input {
    width: 100%;
    padding: 14px 16px;
    background: #0f0f18;
    border: 1px solid #2a2a38;
    border-radius: 12px;
    color: #e8e8f0;
    font-size: 1.1rem;
    font-weight: 500;
    outline: none;
    transition: border-color 0.15s;
  }

  .num-input:focus {
    border-color: #6366f1;
  }

  .num-input::placeholder { color: #374151; }

  .prefix-select {
    padding: 14px 12px;
    background: #0f0f18;
    border: 1px solid #2a2a38;
    border-radius: 12px;
    color: #a78bfa;
    font-size: 0.95rem;
    font-weight: 600;
    outline: none;
    cursor: pointer;
    min-width: 90px;
    transition: border-color 0.15s;
    appearance: none;
    -webkit-appearance: none;
    text-align: center;
  }

  .prefix-select:focus { border-color: #6366f1; }

  /* Arrow */
  .arrow-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    align-self: center;
    background: #1e1e2e;
    border: 1px solid #2a2a38;
    border-radius: 50%;
    cursor: pointer;
    color: #6b7280;
    font-size: 1.1rem;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .arrow-btn:hover { border-color: #6366f1; color: #a78bfa; }

  .row2 {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 20px;
  }

  /* Result */
  .result-box {
    background: #0f0f18;
    border: 1px solid #312e81;
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 16px;
    min-height: 68px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .result-label {
    font-size: 0.72rem;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .result-value {
    font-size: 1.5rem;
    font-weight: 700;
    color: #a78bfa;
    word-break: break-all;
    line-height: 1.2;
  }

  .result-unit {
    font-size: 0.9rem;
    color: #60a5fa;
    font-weight: 500;
  }

  /* Convert button */
  .convert-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }

  .convert-btn:hover { opacity: 0.9; }
  .convert-btn:active { transform: scale(0.98); }

  /* Reference table */
  .ref-toggle {
    margin-top: 16px;
    text-align: center;
    font-size: 0.8rem;
    color: #6366f1;
    cursor: pointer;
    user-select: none;
  }

  .ref-table {
    display: none;
    margin-top: 12px;
    overflow: hidden;
    border-radius: 12px;
    border: 1px solid #2a2a38;
  }

  .ref-table.open { display: block; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }

  th {
    background: #13131b;
    color: #6b7280;
    padding: 8px 12px;
    text-align: left;
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  td {
    padding: 8px 12px;
    border-top: 1px solid #1e1e2e;
    color: #d1d5db;
  }

  tr:hover td { background: #1a1a24; }

  td:nth-child(2), td:nth-child(3) { color: #a78bfa; font-weight: 600; }

  /* History */
  .history {
    margin-top: 12px;
  }

  .history-item {
    font-size: 0.82rem;
    color: #4b5563;
    padding: 5px 0;
    border-bottom: 1px solid #1e1e2e;
    display: flex;
    justify-content: space-between;
  }

  .history-item span { color: #7c3aed; }

  @media (max-width: 360px) {
    .unit-tab { font-size: 0.75rem; padding: 7px 3px; }
    .result-value { font-size: 1.25rem; }
  }
</style>
</head>
<body>

<h1>⚡ Конвертер единиц</h1>
<p class="subtitle">Электрические величины · В, А, Ом, Ф, Гц</p>

<div class="card">

  <!-- Unit type -->
  <div class="unit-tabs">
    <div class="unit-tab active" data-unit="V" data-ru="В">Вольты</div>
    <div class="unit-tab" data-unit="A" data-ru="А">Амперы</div>
    <div class="unit-tab" data-unit="Ω" data-ru="Ом">Омы</div>
    <div class="unit-tab" data-unit="F" data-ru="Ф">Фарады</div>
    <div class="unit-tab" data-unit="Hz" data-ru="Гц">Герцы</div>
  </div>

  <!-- From -->
  <div class="input-row">
    <div class="input-wrap">
      <input class="num-input" id="fromVal" type="number" placeholder="Введите значение" inputmode="decimal">
    </div>
    <select class="prefix-select" id="fromPrefix"></select>
  </div>

  <!-- Swap + To prefix -->
  <div class="row2">
    <div style="flex:1">
      <select class="prefix-select" id="toPrefix" style="width:100%"></select>
    </div>
    <button class="arrow-btn" id="swapBtn" title="Поменять местами">⇅</button>
  </div>

  <!-- Result -->
  <div class="result-box">
    <div class="result-label">Результат</div>
    <div id="resultValue" class="result-value">—</div>
    <div id="resultUnit" class="result-unit"></div>
  </div>

  <button class="convert-btn" id="convertBtn">Конвертировать</button>

  <!-- History -->
  <div class="history" id="history"></div>

  <!-- Reference -->
  <div class="ref-toggle" id="refToggle">📋 Таблица приставок ▾</div>
  <div class="ref-table" id="refTable">
    <table>
      <tr><th>Приставка</th><th>Межд.</th><th>Рус.</th><th>Степень</th></tr>
      <tr><td>пико</td><td>p</td><td>п</td><td>10⁻¹²</td></tr>
      <tr><td>нано</td><td>n</td><td>н</td><td>10⁻⁹</td></tr>
      <tr><td>микро</td><td>μ / u</td><td>мк</td><td>10⁻⁶</td></tr>
      <tr><td>милли</td><td>m</td><td>м</td><td>10⁻³</td></tr>
      <tr><td>—</td><td>—</td><td>—</td><td>10⁰</td></tr>
      <tr><td>кило</td><td>k</td><td>к</td><td>10³</td></tr>
      <tr><td>мега</td><td>M</td><td>М</td><td>10⁶</td></tr>
      <tr><td>гига</td><td>G</td><td>Г</td><td>10⁹</td></tr>
      <tr><td>тера</td><td>T</td><td>Т</td><td>10¹²</td></tr>
    </table>
  </div>

</div>

<script>
const PREFIXES = [
  { label: 'пВ / pV',  ru: 'п',  exp: -12 },
  { label: 'нВ / nV',  ru: 'н',  exp: -9  },
  { label: 'мкВ / uV', ru: 'мк', exp: -6  },
  { label: 'мВ / mV',  ru: 'м',  exp: -3  },
  { label: 'В',        ru: '',   exp:  0  },
  { label: 'кВ / kV',  ru: 'к',  exp:  3  },
  { label: 'МВ / MV',  ru: 'М',  exp:  6  },
  { label: 'ГВ / GV',  ru: 'Г',  exp:  9  },
  { label: 'ТВ / TV',  ru: 'Т',  exp:  12 },
];

const UNITS = {
  V:  { ru: 'В',  en: 'V',  name: 'Вольт' },
  A:  { ru: 'А',  en: 'A',  name: 'Ампер' },
  'Ω':{ ru: 'Ом', en: 'Ω',  name: 'Ом' },
  F:  { ru: 'Ф',  en: 'F',  name: 'Фарад' },
  Hz: { ru: 'Гц', en: 'Hz', name: 'Герц' },
};

const PREFIX_LABELS = [
  { exp: -12, ru: 'п',  en: 'p',  name: 'пико' },
  { exp: -9,  ru: 'н',  en: 'n',  name: 'нано' },
  { exp: -6,  ru: 'мк', en: 'u',  name: 'микро' },
  { exp: -3,  ru: 'м',  en: 'm',  name: 'милли' },
  { exp:  0,  ru: '',   en: '',   name: '' },
  { exp:  3,  ru: 'к',  en: 'k',  name: 'кило' },
  { exp:  6,  ru: 'М',  en: 'M',  name: 'мега' },
  { exp:  9,  ru: 'Г',  en: 'G',  name: 'гига' },
  { exp:  12, ru: 'Т',  en: 'T',  name: 'тера' },
];

let currentUnit = 'V';
const history = [];

function buildLabel(prefix, unit) {
  const u = UNITS[unit];
  const p = prefix;
  if (p.exp === 0) return `${u.ru} (${u.en})`;
  return `${p.ru}${u.ru} / ${p.en}${u.en}`;
}

function fillSelects() {
  const fromSel = document.getElementById('fromPrefix');
  const toSel = document.getElementById('toPrefix');
  fromSel.innerHTML = '';
  toSel.innerHTML = '';
  PREFIX_LABELS.forEach((p, i) => {
    const opt1 = new Option(buildLabel(p, currentUnit), i);
    const opt2 = new Option(buildLabel(p, currentUnit), i);
    fromSel.add(opt1);
    toSel.add(opt2);
  });
  // Defaults: from = base (index 4), to = kilo (index 5)
  fromSel.value = 4;
  toSel.value = 3;
}

function convert() {
  const val = parseFloat(document.getElementById('fromVal').value.replace(',', '.'));
  if (isNaN(val)) {
    document.getElementById('resultValue').textContent = '—';
    document.getElementById('resultUnit').textContent = '';
    return;
  }
  const fromIdx = parseInt(document.getElementById('fromPrefix').value);
  const toIdx = parseInt(document.getElementById('toPrefix').value);
  const fromExp = PREFIX_LABELS[fromIdx].exp;
  const toExp = PREFIX_LABELS[toIdx].exp;

  const base = val * Math.pow(10, fromExp);
  const result = base / Math.pow(10, toExp);

  const fmt = (n) => {
    if (Math.abs(n) === 0) return '0';
    if (Math.abs(n) >= 1e-3 && Math.abs(n) < 1e12) {
      // use toPrecision but trim zeros
      let s = parseFloat(n.toPrecision(8)).toString();
      return s;
    }
    return n.toExponential(4);
  };

  const u = UNITS[currentUnit];
  const toPre = PREFIX_LABELS[toIdx];
  const unitStr = toPre.exp === 0 ? u.ru : `${toPre.ru}${u.ru}`;
  const unitEnStr = toPre.exp === 0 ? u.en : `${toPre.en}${u.en}`;

  document.getElementById('resultValue').textContent = fmt(result);
  document.getElementById('resultUnit').textContent = `${unitStr}  (${unitEnStr})`;

  // History
  const fromPre = PREFIX_LABELS[fromIdx];
  const fromUnit = fromPre.exp === 0 ? u.ru : `${fromPre.ru}${u.ru}`;
  const entry = `${val} ${fromUnit} = ${fmt(result)} ${unitStr}`;
  history.unshift(entry);
  if (history.length > 5) history.pop();
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history');
  if (!history.length) { el.innerHTML = ''; return; }
  el.innerHTML = history.map(h => `<div class="history-item"><span>${h}</span></div>`).join('');
}

// Tabs
document.querySelectorAll('.unit-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.unit-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentUnit = tab.dataset.unit;
    fillSelects();
    convert();
  });
});

// Swap
document.getElementById('swapBtn').addEventListener('click', () => {
  const from = document.getElementById('fromPrefix');
  const to = document.getElementById('toPrefix');
  const tmp = from.value;
  from.value = to.value;
  to.value = tmp;
  convert();
});

// Auto convert on input
document.getElementById('fromVal').addEventListener('input', convert);
document.getElementById('fromPrefix').addEventListener('change', convert);
document.getElementById('toPrefix').addEventListener('change', convert);

// Convert button
document.getElementById('convertBtn').addEventListener('click', convert);

// Ref table toggle
document.getElementById('refToggle').addEventListener('click', () => {
  const t = document.getElementById('refTable');
  t.classList.toggle('open');
  document.getElementById('refToggle').textContent = t.classList.contains('open')
    ? '📋 Таблица приставок ▴'
    : '📋 Таблица приставок ▾';
});

// Enter key
document.getElementById('fromVal').addEventListener('keydown', e => {
  if (e.key === 'Enter') convert();
});

fillSelects();
</script>
</body>
</html>
